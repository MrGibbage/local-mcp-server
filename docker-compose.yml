services:
  homelab-mcp:
    build: .
    container_name: homelab-mcp
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - /home/skip/.ssh:/keys:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CONFIG_PATH=/app/config.yaml