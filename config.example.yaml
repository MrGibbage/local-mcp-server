# Homelab MCP Server — example configuration
# Copy this to config.yaml and fill in your values.
# config.yaml is gitignored so secrets stay local.

server:
  host: "0.0.0.0"   # bind address — keep this LAN-only, never expose to internet
  port: 8080

# The host used when a tool is called without an explicit host argument.
default_host: docker-server

hosts:
  docker-server:
    hostname: 192.168.1.100   # IP or resolvable hostname
    user: myuser
    key_path: /keys/id_rsa    # path inside the container (mounted from ./keys/)
    # port: 22                # optional, defaults to 22

  nas:
    hostname: 192.168.1.101
    user: myuser
    key_path: /keys/id_rsa

  proxmox:
    hostname: 192.168.1.102
    user: root
    key_path: /keys/id_rsa_proxmox

  vm1:
    hostname: 192.168.1.103
    user: myuser
    key_path: /keys/id_rsa

  mediaserver:
    hostname: 192.168.1.104
    user: myuser
    key_path: /keys/id_rsa

# OPNsense firewall/router API integration.
# Used by caddy_* and opnsense_* tools.
# Create an API key at System → Access → Users → your user → API keys.
# Scope the key to: Caddy plugin + DHCP (read).
opnsense:
  url: "https://192.168.0.1"      # OPNsense web UI address
  api_key: "your-api-key"
  api_secret: "your-api-secret"

# Cloudflare integration — two scoped API tokens (never share them).
# Create tokens at: dash.cloudflare.com → My Profile → API Tokens.
cloudflare:
  account_id: "your-account-id"            # Cloudflare account ID
  tunnel_id: "your-tunnel-id"              # Zero Trust → Networks → Tunnels
  tunnel_api_token: "your-tunnel-token"    # Permission: Cloudflare Tunnel: Edit
  access_api_token: "your-access-token"   # Permission: Access: Apps and Policies: Edit

# BookStack documentation wiki integration.
# Used by the bookstack_* tools to read and update wiki pages via the REST API.
bookstack:
  url: "https://bookstack.example.com"   # base URL, no trailing slash
  token_id: "your-token-id"              # API token ID from BookStack profile
  token_secret: "your-token-secret"      # API token secret

# Optional: restrict which base commands ssh_exec is allowed to run.
# Comment out this block (or set to null) to allow all commands.
# The check matches the first word of the command against this list.
#
# ssh_command_allowlist:
#   - docker
#   - systemctl
#   - df
#   - free
#   - cat
#   - ls
#   - journalctl

# ---------------------------------------------------------------------------
# Homelab API proxy — credentials come from env vars in .env, never here.
# Add a new service: append a block, add the env var to .env, restart.
# To verify a new service: homelab_api_get("<service>", "/system/status")
# ---------------------------------------------------------------------------

api_services:

  # --- Example: Radarr on smavm ---
  radarr:
    base_url: http://192.168.1.100:7878/api/v3
    auth_style: header        # header | bearer | token | query_param
    auth_header: X-Api-Key    # used when auth_style: header
    auth_env: RADARR_API_KEY  # env var name in .env
    post_allowlist:
      - /command              # trigger rescan, refresh, search
      - /movie/editor         # bulk edit (tag/monitor only — no delete key in body)

  # --- Example: SABnzbd (uses query_param auth) ---
  sabnzbd:
    base_url: http://192.168.1.100:8080
    auth_style: query_param
    auth_param: apikey        # used when auth_style: query_param
    auth_env: SABNZBD_API_KEY
    # No post_allowlist — SABnzbd uses GET ?mode= for everything

  # --- Example: Grafana (bearer token, read-only via Claude) ---
  grafana:
    base_url: http://192.168.1.101:3000/api
    auth_style: bearer
    auth_env: GRAFANA_API_TOKEN
    # No post_allowlist — writes belong in the UI
