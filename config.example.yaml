# Homelab MCP Server — example configuration
# Copy this to config.yaml and fill in your values.
# config.yaml is gitignored so secrets stay local.

server:
  host: "0.0.0.0"   # bind address — keep this LAN-only, never expose to internet
  port: 8080

# The host used when a tool is called without an explicit host argument.
default_host: docker-server

hosts:
  docker-server:
    hostname: 192.168.1.100   # IP or resolvable hostname
    user: myuser
    key_path: /keys/id_rsa    # path inside the container (mounted from ./keys/)
    # port: 22                # optional, defaults to 22

  nas:
    hostname: 192.168.1.101
    user: myuser
    key_path: /keys/id_rsa

  proxmox:
    hostname: 192.168.1.102
    user: root
    key_path: /keys/id_rsa_proxmox

  vm1:
    hostname: 192.168.1.103
    user: myuser
    key_path: /keys/id_rsa

  mediaserver:
    hostname: 192.168.1.104
    user: myuser
    key_path: /keys/id_rsa

# Optional: restrict which base commands ssh_exec is allowed to run.
# Comment out this block (or set to null) to allow all commands.
# The check matches the first word of the command against this list.
#
# ssh_command_allowlist:
#   - docker
#   - systemctl
#   - df
#   - free
#   - cat
#   - ls
#   - journalctl
